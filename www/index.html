<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TripGo</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0a3d91; color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .wrap { height: 100%; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 18px; text-align: center; padding: 24px; }
    .logo { font-size: 30px; font-weight: 800; letter-spacing: -.5px; }
    .logo span { color: #ffd166; }
    .spinner { width: 38px; height: 38px; border: 3px solid rgba(255,255,255,.25);
      border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite; }
    p { opacity: .85; font-size: 14px; max-width: 280px; }
    a { color: #ffd166; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Offline / fallback screen. The app normally loads the live site via
       Capacitor server.url (https://trip-clone-mocha.vercel.app). -->
  <div class="wrap">
    <div class="logo">✈ Trip<span>Go</span></div>
    <div class="spinner" aria-hidden="true"></div>
    <p id="msg">Loading your trip…</p>
  </div>
  <script>
    // If the live site can't be reached, show a friendly offline message.
    setTimeout(function () {
      if (!navigator.onLine) {
        document.querySelector(".spinner").style.display = "none";
        document.getElementById("msg").innerHTML =
          "You appear to be offline.<br/>Please check your connection and reopen the app.";
      }
    }, 2500);
  </script>
</body>
</html>
